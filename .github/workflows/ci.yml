name: CI

on:
  pull_request:

jobs:
  # ── 1. LINT ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black flake8 isort

      - name: black
        run: black --check .

      - name: flake8
        run: flake8 laiser/ tests/ --max-line-length=120 --extend-ignore=E203,W503,E266,W291,E501,E402

      - name: isort
        run: isort --check-only .


  # ── 3. SECURITY ────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install dependencies
        run: pip install -e ".[dev]" bandit pip-audit

      - name: bandit (code scan)
        run: bandit -r laiser/ -ll

      - name: pip-audit (dependency CVEs)
        # CVE-2026-4539 ignored - affects pygments 2.19.2, no fix available yet
        run: pip-audit --ignore-vuln CVE-2026-4539

  # ── 3. TYPE CHECK ──────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install mypy
        run: pip install mypy

      - name: mypy
        run: mypy laiser/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ── 4. LICENSE CHECK ───────────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-licenses
        run: pip install pip-licenses -e ".[dev]"

      - name: Check licenses
        # Fail if any GPL licensed dependency is found
        run: pip-licenses --fail-on="GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3"

  # ── 5. DEAD CODE ───────────────────────────────────────────────────────────
  dead-code:
    name: Dead Code
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install vulture
        run: pip install vulture

      - name: vulture
        id: vulture
        run: |
          set +e
          OUTPUT=$(vulture laiser/ --min-confidence 80 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "found=$( [ $EXIT_CODE -ne 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
          exit 0

      - name: Post code hygiene summary
        uses: actions/github-script@v7
        with:
          script: |
            const found = '${{ steps.vulture.outputs.found }}' === 'true';
            const output = `${{ steps.vulture.outputs.output }}`.trim();

            const lines = found ? output.split('\n') : [];
            const items = lines.map(l => {
              const m = l.match(/^(.+):(\d+):\s+(.+)$/);
              return m ? `- \`${m[1]}:${m[2]}\` — ${m[3]}` : `- ${l}`;
            }).slice(0, 25).join('\n');
            const overflow = lines.length > 25 ? `\n_+${lines.length - 25} more_` : '';

            const body = found
              ? [
                  '**Code Hygiene**',
                  '',
                  'The following items are defined but not yet in active use. Routine cleanup — no impact on functionality.',
                  '',
                  items + overflow,
                ].join('\n')
              : '**Code Hygiene** — All clear. Nothing to clean up.';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('**Code Hygiene**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── 6. COMPLEXITY ──────────────────────────────────────────────────────────
  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install radon
        run: pip install radon

      - name: radon complexity
        id: radon
        run: |
          set +e
          OUTPUT=$(radon cc laiser/ --min B --show-complexity --average 2>&1)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit 0

      - name: Post complexity insights
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.radon.outputs.output }}`.trim();
            if (!output) return;

            const lines = output.split('\n');
            const avgLine = lines[lines.length - 1] || '';
            const gradeMatch = avgLine.match(/Average complexity: ([A-F])\s*\(([\d.]+)\)/);
            const grade = gradeMatch ? gradeMatch[1] : 'B';
            const score = gradeMatch ? gradeMatch[2] : '';

            const gradeLabel = { A: 'Excellent', B: 'Good', C: 'Moderate', D: 'Elevated', E: 'High', F: 'High' };
            const label = gradeLabel[grade] || 'N/A';

            const blockLines = lines.filter(l => /^\s+(M|F|C)\s/.test(l));
            const parsed = blockLines.map(l => {
              const m = l.trim().match(/^([MCF])\s+\d+:\d+\s+(.+?)\s+-\s+([A-F])\s+\((\d+)\)$/);
              if (!m) return null;
              const [, type, name, g, n] = m;
              const typeLabel = type === 'M' ? 'Method' : type === 'F' ? 'Function' : 'Class';
              return { g, name, typeLabel, n: parseInt(n, 10) };
            }).filter(Boolean);
            parsed.sort((a, b) => b.n - a.n);
            const rows = parsed.map(({ g, name, typeLabel, n }) =>
              `| ${g} | \`${name}\` | ${typeLabel} | ${n} |`
            ).join('\n');

            const body = [
              '**Complexity Analysis**',
              '',
              `Average: **${grade} — ${label}** ${score ? `(${score})` : ''}`,
              '',
              'Hotspots tracked below. These are functional, well-exercised components — listed for visibility as the codebase scales.',
              '',
              rows ? '| Grade | Name | Type | Score |\n|-------|------|------|-------|\n' + rows : '_Nothing above grade B._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('**Complexity Analysis**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── 7. BUILD ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, security, type-check, license-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build twine
          python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
