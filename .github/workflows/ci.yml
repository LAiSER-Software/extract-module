name: CI

on:
  pull_request:

jobs:
  # ── 1. LINT ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black flake8 isort

      - name: black
        run: black --check .

      - name: flake8
        run: flake8 laiser/ tests/ --max-line-length=120 --extend-ignore=E203,W503,E266,W291,E501,E402

      - name: isort
        run: isort --check-only .


  # ── 3. SECURITY ────────────────────────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install dependencies
        run: pip install -e ".[dev]" bandit pip-audit

      - name: bandit (code scan)
        run: bandit -r laiser/ -ll

      - name: pip-audit (dependency CVEs)
        # CVE-2026-4539 ignored - affects pygments 2.19.2, no fix available yet
        run: pip-audit --ignore-vuln CVE-2026-4539

  # ── 3. TYPE CHECK ──────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy
        run: pip install mypy

      - name: mypy
        run: mypy laiser/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ── 4. LICENSE CHECK ───────────────────────────────────────────────────────
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-licenses
        run: pip install pip-licenses -e ".[dev]"

      - name: Check licenses
        # Fail if any GPL licensed dependency is found
        run: pip-licenses --fail-on="GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3"

  # ── 5. DEAD CODE ───────────────────────────────────────────────────────────
  dead-code:
    name: Dead Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install vulture
        run: pip install vulture

      - name: vulture
        run: vulture laiser/ --min-confidence 80
        continue-on-error: true

  # ── 6. COMPLEXITY ──────────────────────────────────────────────────────────
  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install radon
        run: pip install radon

      - name: radon complexity
        run: radon cc laiser/ --min B --show-complexity --average
        continue-on-error: true

  # ── 7. BUILD ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, security, type-check, license-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build twine
          python -m build

      - name: Validate package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
